  <meta charset="utf-8">

  <link rel="stylesheet" href="assets/css/styles.min.css?20260720">
  <link rel="stylesheet" href="assets/css/days-sober.min.css?20260720">
</head>

<body>
  <div id="layout" class="pure-g">
    <div class="sidebar pure-u-1 pure-u-lg-1-4">
      <div class="header">
        <h1 class="brand-title"><a href="/">dobuforge</a></h1>
        <h2 class="brand-tagline">We develop software.</h2>
        <nav class="nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a class="pure-button" href="./">Home</a>
              <a class="pure-button" href="products.html">Products</a>
              <a class="pure-button" href="contact.html">Contact</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
    <main class="content pure-u-1 pure-u-lg-3-4">
      <div>
        <div class="posts">
          <h1 class="content-subhead">Days Sober</h1>
          <section class="post">
            <header class="post-header">
              <h2 class="post-title">断酒カウンター</h2>
            </header>
            <div class="post-description">
              <div class="sober-wrap">
                <section class="sober-card" aria-label="断酒カウンター">
                  <div class="sober-card-header">
                    <div class="sober-icon" aria-hidden="true">♥</div>
                    <div>
                      <p class="sober-title">Your Sobriety Journey</p>
                      <p class="sober-since">Since June 25, 2026</p>
                    </div>
                  </div>

                  <div class="sober-days" id="sober-days">--</div>
                  <div class="sober-label">Days Sober</div>

                  <div class="sober-badge" id="sober-badge">Loading...</div>
                </section>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
<script>
  (() => {
    const MS_PER_DAY = 24 * 60 * 60 * 1000;

    function dateOnlyUtc(year, month, day) {
      return Date.UTC(year, month - 1, day);
    }

    function todayOnlyUtc() {
      const now = new Date();
      return Date.UTC(
        now.getFullYear(),
        now.getMonth(),
        now.getDate()
      );
    }

    const startDate = dateOnlyUtc(2026, 6, 25);
    const today = todayOnlyUtc();

    const elapsedDays = Math.floor((today - startDate) / MS_PER_DAY);
    const daysSober = Math.max(0, elapsedDays + 1);

    document.getElementById("sober-days").textContent = daysSober;
    document.getElementById("sober-badge").textContent = `${daysSober} Days`;
  })();
</script>
</body>
