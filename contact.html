<!doctype html>
<html lang="ja" role="main">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="dobuforge develops software.">
  <title>dobuforge</title>
  <link rel="stylesheet" href="assets/css/styles.min.css?20251128">
  <link rel="stylesheet" href="assets/css/form.min.css?20251128">
</head>

<body>
  <div id="layout" class="pure-g">
    <div class="sidebar pure-u-1 pure-u-lg-1-4">
      <div class="header">
        <h1 class="brand-title">dobuforge</h1>
        <h2 class="brand-tagline">We develop software.</h2>
        <nav class="nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a class="pure-button" href="/">Home</a>
              <a class="pure-button" href="products.html">Products</a>
              <a class="pure-button" href="contact.html">Contact</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
    <div class="content pure-u-1 pure-u-lg-3-4">
      <div>
        <div class="posts">
          <h1 class="content-subhead">Contact</h1>
          <section class="post">
            <header class="post-header">
              <h2 class="post-title">Invitation to the mail form</h2>
            </header>
            <div class="post-description">
              <p>
                お問い合わせ等がある場合は下記よりご連絡ください。
              </p>
              <p>
                不正アクセス対策のため、有効なメールアドレスにメールフォームURLを送信させていただきます。時間制限を設けておりますので、メールを受信しましたらすぐにメールフォームをお使いください。
              </p>
              <form method="POST" class="pure-form pure-form-stacked">
                  <fieldset>
                    <label for="stacked-email">Email</label>
                    <input type="email" name="email" placeholder="Email" required>
                    <button type="submit" class="pure-button pure-button-primary">送信</button>
                  </form>
              </fieldset>
              <p id="contact-result" style="margin-top:0.5rem;"></p>
            </div>
          </section>
        </div>

        <div class="footer">
          <div class="pure-menu pure-menu-horizontal">
            <ul>
              <li class="pure-menu-item"><a href="https://github.com/fumakillers/" class="pure-menu-link">GitHub</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
  (function () {
    "use strict";

    const FUNCTION_URL = "https://sho5mhqa234kqae2hpfgebu6zi0fmhbc.lambda-url.ap-northeast-1.on.aws/";

    window.addEventListener("DOMContentLoaded", function () {
      const form = document.querySelector("form");
      if (!form) return;

      const emailInput = form.elements["email"];
      const resultEl = document.getElementById("contact-result");
      const submitBtn = form.querySelector("button[type=submit]");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        if (!emailInput || !emailInput.value) {
          if (resultEl) resultEl.textContent = "メールアドレスを入力してください。";
          return;
        }

        const email = emailInput.value.trim();

        // ボタン連打防止
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = "送信中...";
        }
        if (resultEl) {
          resultEl.textContent = "";
        }

        try {
          const resp = await fetch(FUNCTION_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
          });

          if (!resp.ok) {
            // Lambda は 200 以外のとき text で "Internal Server Error" とか返す
            const text = await resp.text().catch(() => "");
            if (resultEl) {
              resultEl.textContent = "エラーが発生しました。（" + resp.status + " " + text + "）";
            }
          } else {
            if (resultEl) {
              resultEl.textContent =
                "入力いただいたメールアドレス宛に、フォームへのURLを送信しました。メールをご確認ください。";
            }
            // 必要ならメールアドレスを空に
            // emailInput.value = "";
          }
        } catch (err) {
          console.error(err);
          if (resultEl) {
            resultEl.textContent = "通信に失敗しました。少し時間をおいてから再度お試しください。";
          }
        } finally {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = "送信";
          }
        }
      });
    });
  })();
</script>
</body>

</html>
